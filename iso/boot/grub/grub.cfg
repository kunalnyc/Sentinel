set timeout=3
set default=0

# Enable graphics modes
insmod vbe
insmod vesa

menuentry "SentinelOS (1024x768)" {
    set gfxmode=1024x768x32
    set gfxpayload=keep
    multiboot2 /boot/sentinel.bin
    boot
}

menuentry "SentinelOS (1280x1024)" {
    set gfxmode=1280x1024x32
    set gfxpayload=keep
    multiboot2 /boot/sentinel.bin
    boot
}

menuentry "SentinelOS (VGA Fallback)" {
    set gfxmode=640x480
    set gfxpayload=keep
    multiboot2 /boot/sentinel.bin
    boot
}